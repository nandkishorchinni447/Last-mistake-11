<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAST MISTAKE</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}
body{
background:#050816;
overflow:hidden;
color:white;
user-select:none;
touch-action:none;
}
#game{
width:100vw;
height:100vh;
position:relative;
overflow:hidden;
background:radial-gradient(circle at top,#172554,#020617 60%);
}
.topBar{
position:absolute;
top:0;
left:0;
width:100%;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}
.card{
background:rgba(255,255,255,.08);
padding:14px 20px;
border-radius:18px;
backdrop-filter:blur(12px);
font-weight:700;
}
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}
.title{
font-size:clamp(48px,9vw,110px);
font-weight:900;
letter-spacing:4px;
}
.subtitle{
margin-top:10px;
color:#cbd5e1;
font-size:20px;
}
.btn{
margin-top:30px;
display:inline-block;
padding:18px 36px;
border-radius:18px;
background:white;
color:black;
font-weight:900;
font-size:22px;
cursor:pointer;
transition:.2s;
}
.btn:hover{
transform:scale(1.05);
}
#roundTitle{
font-size:50px;
font-weight:900;
margin-bottom:20px;
}
#instruction{
font-size:34px;
font-weight:800;
}
#arena{
position:absolute;
inset:0;
}
.circleBtn{
width:110px;
height:110px;
border-radius:50%;
position:absolute;
transform:translate(-50%,-50%) ;
cursor:pointer;
}
.hidden{
display:none;
}
#countdown{
font-size:140px;
font-weight:900;
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}
.playerList{
position:absolute;
left:20px;
bottom:20px;
width:260px;
max-height:50vh;
overflow:auto;
background:rgba(255,255,255,.07);
padding:16px;
border-radius:18px;
}
.playerRow{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,.06);
}
.alive{
color:#22c55e;
}
.dead{
color:#ef4444;
text-decoration:line-through;
opacity:.6;
}
#eliminatedBanner{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:72px;
font-weight:900;
color:#ef4444;
display:none;
z-index:50;
animation:pop .4s ease;
}
@keyframes pop{
from{transform:translate(-50%,-50%) scale(.4);opacity:0}
to{transform:translate(-50%,-50%) scale(1);opacity:1}
}
.flash{ position:absolute; inset:0; background:white; opacity:0; pointer-events:none; z-index:90; }

/* Temptation Styles */
.popup{
position:absolute;
background:white;
color:black;
padding:18px;
border-radius:16px;
width:320px;
box-shadow:0 10px 50px rgba(0,0,0,.5);
animation:popupAnim .3s ease;
z-index: 100;
}
.popup button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:700;
cursor:pointer;
}
@keyframes popupAnim{
from{transform:scale(.5);opacity:0}
to{transform:scale(1);opacity:1}
}
.shake{
animation:shakeAnim .15s infinite;
}
@keyframes shakeAnim{
0%{transform:translate(3px,0)}
25%{transform:translate(-3px,0)}
50%{transform:translate(0,3px)}
75%{transform:translate(0,-3px)}
100%{transform:translate(3px,0)}
}
.glitch{
animation:glitchAnim .08s infinite;
}
@keyframes glitchAnim{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(90deg)}
}
.fakeNotif{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
padding:18px 25px;
border-radius:18px;
width:380px;
max-width:90vw;
border:1px solid rgba(255,255,255,.1);
animation:slideDown .4s ease;
z-index: 100;
}
@keyframes slideDown{
from{transform:translate(-50%,-120px)}
to{transform:translate(-50%,0)}
}
.fakeButton{
position:absolute;
padding:20px 35px;
background:#ef4444;
border-radius:20px;
font-weight:800;
animation:pulseBtn 1s infinite;
z-index: 100;
cursor:pointer;
}
@keyframes pulseBtn{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}
.crack{
position:absolute;
inset:0;
background:url('https://i.imgur.com/eM3g1QX.png') center/cover;
opacity:.35;
pointer-events:none;
z-index: 100;
}

/* PREMIUM ENDING SCREEN STYLES */
#endScreen{
position:fixed;
inset:0;
display:none; /* Managed dynamically by script */
align-items:center;
justify-content:center;
background:radial-gradient(circle at center,#220033,#020617 70%);
overflow:hidden;
z-index: 500;
}
#particles{
position:absolute;
inset:0;
overflow:hidden;
}
.particle{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:rgba(255,255,255,.4);
animation:float 10s linear infinite;
}
@keyframes float{
0%{ transform:translateY(100vh) scale(0.5); opacity:0; }
20%{ opacity:1; }
100%{ transform:translateY(-120vh) scale(1.4); opacity:0; }
}
#card{
position:relative;
width:min(950px,92vw);
padding:50px;
border-radius:40px;
background:rgba(10,10,25,.78);
border:2px solid rgba(168,85,247,.25);
backdrop-filter:blur(14px);
box-shadow: 0 0 80px rgba(168,85,247,.18), 0 0 140px rgba(255,0,80,.12);
text-align:center;
overflow:hidden;
animation:slam .6s ease;
}
@keyframes slam{
0%{ transform:scale(1.25); opacity:0; filter:blur(12px); }
100%{ transform:scale(1); opacity:1; filter:blur(0px); }
}
#bgPulse{
position:absolute;
inset:0;
background:radial-gradient(circle,#ff003344,transparent 65%);
animation:premiumPulse 3s infinite;
pointer-events:none;
}
@keyframes premiumPulse{
0%{opacity:.3;}
50%{opacity:.9;}
100%{opacity:.3;}
}
#title{
font-size:clamp(55px,9vw,120px);
font-weight:900;
letter-spacing:4px;
text-shadow:0 0 30px rgba(255,255,255,.3);
}
#subtitle{
margin-top:10px;
font-size:44px;
font-weight:900;
color:#ef4444;
}
#placement{
margin-top:18px;
font-size:34px;
font-weight:800;
color:#22c55e;
}
#cause{
margin-top:25px;
font-size:28px;
color:#fca5a5;
}
#almost{
margin-top:18px;
font-size:26px;
color:#facc15;
font-weight:800;
}
#stats{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
}
.stat{
background:rgba(255,255,255,.05);
padding:22px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}
.stat h2{
margin:0;
font-size:20px;
opacity:.7;
}
.stat p{
margin-top:12px;
font-size:38px;
font-weight:900;
}
#fightArea{
margin-top:40px;
height:120px;
border-radius:26px;
background:rgba(255,255,255,.04);
position:relative;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
}
.bot{
position:absolute;
top:25px;
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(135deg,#60a5fa,#a855f7);
box-shadow:0 0 30px rgba(96,165,250,.5);
animation:fight 3s infinite alternate ease-in-out;
}
.bot:nth-child(2){
left:70%;
animation-delay:1s;
background:linear-gradient(135deg,#ef4444,#f59e0b);
}
@keyframes fight{
0%{ transform:translateX(-60px) scale(1); }
100%{ transform:translateX(60px) scale(1.15); }
}
#buttons{
margin-top:45px;
display:flex;
justify-content:center;
gap:22px;
flex-wrap:wrap;
}
.endBtn{
padding:20px 36px;
border-radius:22px;
font-size:26px;
font-weight:900;
cursor:pointer;
transition:.25s;
border:none;
}
.endBtn:hover{
transform:scale(1.06);
}
.home{
background:rgba(255,255,255,.08);
color:white;
}
.restart{
background:linear-gradient(135deg,#facc15,#f59e0b);
color:black;
box-shadow:0 12px 30px rgba(250,204,21,.3);
}
</style>
</head>
<body>
<div id="game">
<div class="topBar">
<div class="card" id="rank">Rank: Bronze</div>
<div class="card" id="aliveCount">20 Alive</div>
<div class="card" id="wins">Wins: 0</div>
</div>
<div id="arena"></div>
<div class="flash" id="flash"></div>
<div class="center" id="menu">
<div class="title">LAST MISTAKE</div>
<div class="subtitle">One mistake and you're eliminated.</div>
<div class="btn" onclick="startMatch()">PLAY MATCH</div>
</div>
<div class="center hidden" id="gameUI">
<div id="countdown"></div>
<div id="roundTitle"></div>
<div id="instruction"></div>
</div>
<div class="playerList" id="playerList"></div>
<div id="eliminatedBanner">ELIMINATED</div>

<div id="endScreen">
<div id="particles"></div>
<div id="card">
<div id="bgPulse"></div>
<div id="title">HEARTBREAK</div>
<div id="subtitle">ROUND 11</div>
<div id="placement">#2 / 20 SURVIVORS</div>
<div id="cause">❌ Pressed the wrong color</div>
<div id="almost">⚡ YOU WERE 1 ROUND FROM VICTORY</div>
<div id="stats">
<div class="stat">
<h2>ROUNDS</h2>
<p id="statRounds">0</p>
</div>
<div class="stat">
<h2>FASTEST TAP</h2>
<p id="statFastest">--</p>
</div>
<div class="stat">
<h2>ACCURACY</h2>
<p id="statAccuracy">100%</p>
</div>
<div class="stat">
<h2>ELIMINATED BOTS</h2>
<p id="statEliminated">0</p>
</div>
</div>
<div id="fightArea">
<div class="bot"></div>
<div class="bot"></div>
</div>
<div id="buttons">
<button class="endBtn home" onclick="goHome()">🏠 HOME</button>
<button class="endBtn restart" onclick="restartGame()">🔄 RESTART</button>
</div>
</div>
</div>
</div>

<script>
const arena = document.getElementById('arena');
const menu = document.getElementById('menu');
const gameUI = document.getElementById('gameUI');
const countdownEl = document.getElementById('countdown');
const roundTitle = document.getElementById('roundTitle');
const instruction = document.getElementById('instruction');
const playerList = document.getElementById('playerList');
const aliveCount = document.getElementById('aliveCount');
const eliminatedBanner = document.getElementById('eliminatedBanner');
const endScreen = document.getElementById('endScreen');
const winsEl = document.getElementById('wins');
const rankEl = document.getElementById('rank');
const flash = document.getElementById('flash');

let players=[];
let alivePlayers=[];
let playerAlive=true;
let round=0;
let wins=Number(localStorage.getItem('lm_wins')||0);
let currentMiniGame='';
let acceptingInput=false;
let freezeTouched=false;
let expectedSequence=[];
let playerSequence=[];
let tapCorrect=false;
let roundTimer;
let roundTimeLeft=0;
let lastMiniGame='';
let trapIndex = 0; 
let suddenDeathActive = false; 
let botActionTimeout = null;

// Track Statistics for Premium Dashboard
let roundStartTime = 0;
let fastestTap = Infinity;
let totalActions = 0;
let correctActions = 0;
let initialBotCount = 19;
let specificCauseOfDeath = "Timed Out!";

winsEl.innerHTML='Wins: '+wins;

const names=[
'ShadowX','RapidFox','Nova','Ghost','Blaze','NinjaKid','Storm','Hyper','Void','Alpha','Echo','KillerBee','Pixel','Lime','Toxic','Drift','Ace','Reactor','Venom','Dash'
];

function startMatch(){
menu.classList.add('hidden');
gameUI.classList.remove('hidden');
setupPlayers();
nextRound();
}

function setupPlayers(){
players=[];
playerAlive=true;
round=0;
suddenDeathActive = false;
fastestTap = Infinity;
totalActions = 0;
correctActions = 0;

players.push({
name:'YOU',
alive:true,
isPlayer:true,
reaction:0.9,
memory:0.9,
panic:0.05
});

for(let i=0;i<19;i++){
players.push({
name:names[i],
alive:true,
isPlayer:false,
reaction:Math.random(),
memory:Math.random(),
panic:Math.random()*0.35
});
}

updatePlayerList();
}

function updatePlayerList(){
playerList.innerHTML='';
alivePlayers = players.filter(p=>p.alive);
aliveCount.innerHTML = alivePlayers.length + ' Alive';

players.forEach(p=>{
const row=document.createElement('div');
row.className='playerRow';
row.innerHTML=`
<span class="${p.alive?'alive':'dead'}">${p.name}</span>
<span>${p.alive?'🟢':'💀'}</span>
`;
playerList.appendChild(row);
});
}

function nextRound(){
clearArena();
if(botActionTimeout) clearTimeout(botActionTimeout);
round++;

if(!playerAlive){
loseGame();
return;
}

if(alivePlayers.length<=1){
winGame();
return;
}

suddenDeathActive = (alivePlayers.length === 2);

const games=['tapColor','freeze','memory','chaosRound','followDot'];
let selected = games[Math.floor(Math.random()*games.length)];
while(selected===lastMiniGame){
selected = games[Math.floor(Math.random()*games.length)];
}
lastMiniGame = selected;

setTimeout(()=>{
window[selected]();
},1200);
}

function countdown(num,callback){
countdownEl.innerHTML=num;
let n=num;
const interval=setInterval(()=>{
n--;
if(n<=0){
clearInterval(interval);
countdownEl.innerHTML='GO';
setTimeout(()=>{
countdownEl.innerHTML='';
callback();
},500);
}else{
countdownEl.innerHTML=n;
}
},1000);
}

function startRoundTimer(seconds){
clearInterval(roundTimer);
roundTimeLeft = seconds;
const old=document.getElementById('liveTimer');
if(old) old.remove();
const timerBox=document.createElement('div');
timerBox.id='liveTimer';
timerBox.style.position='absolute';
timerBox.style.top='120px';
timerBox.style.left='50%';
timerBox.style.transform='translateX(-50%)';
timerBox.style.padding='16px 28px';
timerBox.style.borderRadius='20px';
timerBox.style.background='rgba(0,0,0,.6)';
timerBox.style.fontSize='40px';
timerBox.style.fontWeight='900';
timerBox.style.zIndex='80';
timerBox.innerHTML='⏱ '+seconds.toFixed(1)+'s';
game.appendChild(timerBox);
roundTimer=setInterval(()=>{
roundTimeLeft-=0.1;
if(roundTimeLeft<=0){
clearInterval(roundTimer);
roundTimeLeft=0;
}
const t=document.getElementById('liveTimer');
if(t) t.innerHTML='⏱ '+roundTimeLeft.toFixed(1)+'s';
},100);
}

function touchFeedback(x,y){
const fx=document.createElement('div');
fx.style.position='absolute';
fx.style.left=x+'px';
fx.style.top=y+'px';
fx.style.width='120px';
fx.style.height='120px';
fx.style.borderRadius='50%';
fx.style.transform='translate(-50%,-50%)';
fx.style.background='radial-gradient(circle,rgba(255,255,255,.9),transparent 70%)';
fx.style.pointerEvents='none';
fx.style.zIndex='999';
fx.style.animation='tapAnim .4s ease-out forwards';
game.appendChild(fx);
if(navigator.vibrate) navigator.vibrate(40);
setTimeout(()=>fx.remove(),400);
}

const tapStyle=document.createElement('style');
tapStyle.innerHTML=`@keyframes tapAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}`;
document.head.appendChild(tapStyle);

function handleSuddenDeathResolution(winnerIsPlayer) {
acceptingInput = false;
if(botActionTimeout) clearTimeout(botActionTimeout);

if(winnerIsPlayer) {
const bot = players.find(p => !p.isPlayer && p.alive);
if(bot) bot.alive = false;
} else {
specificCauseOfDeath = "Opponent beat you in the Sudden Death race!";
eliminatePlayer();
}
updatePlayerList();
resolveRound();
}

function trackReactionTime() {
const elapsed = (performance.now() - roundStartTime) / 1000;
if(elapsed < fastestTap) {
fastestTap = elapsed;
}
}

function tapColor(){
currentMiniGame='tapColor';
tapCorrect=false;
specificCauseOfDeath = "Timed out on selecting color!";
roundTitle.innerHTML= suddenDeathActive ? 'SUDDEN DEATH 1V1' : 'ROUND ' + round;

const colors=['red','blue','green','yellow'];
const target=colors[Math.floor(Math.random()*colors.length)];

instruction.innerHTML = suddenDeathActive ? 'FASTEST CORRECT TAP WINS: ' + target.toUpperCase() : 'TAP ' + target.toUpperCase();

countdown(3,()=>{
acceptingInput=true;
roundStartTime = performance.now();
startRoundTimer(4);

colors.forEach(color=>{
const btn=document.createElement('div');
btn.className='circleBtn';
btn.style.background=color;
btn.style.left=(20+Math.random()*60)+'vw';
btn.style.top=(25+Math.random()*55)+'vh';
btn.dataset.color=color;

btn.onclick=()=>{
if(!acceptingInput) return;
totalActions++;
if(color===target){
correctActions++;
trackReactionTime();
flashEffect();
if(suddenDeathActive) {
handleSuddenDeathResolution(true);
} else {
tapCorrect=true;
acceptingInput=false;
}
} else {
specificCauseOfDeath = `Pressed ${color.toUpperCase()} instead of ${target.toUpperCase()}!`;
eliminatePlayer();
acceptingInput=false;
if(suddenDeathActive) {
handleSuddenDeathResolution(false); 
}
}
};
arena.appendChild(btn);
});

simulateBots('tapColor',target);

if(!suddenDeathActive) {
setTimeout(()=>{
acceptingInput=false;
if(!tapCorrect && playerAlive) eliminatePlayer();
resolveRound();
},3500);
}
});
}

function freeze(){
currentMiniGame='freeze';
freezeTouched=false;
specificCauseOfDeath = "Fell into temptation and touched during freeze!";
roundTitle.innerHTML='ROUND '+round;
instruction.innerHTML='DON\'T TOUCH';

countdown(3,()=>{
acceptingInput=true;
roundStartTime = performance.now();
startRoundTimer(7); 
simulateBots('freeze');

setTimeout(()=>{
  if(acceptingInput) runSingleTrap(trapIndex);
  trapIndex = (trapIndex + 1) % 10; 
}, 1500);

setTimeout(()=>{
acceptingInput=false;
document.querySelectorAll('.popup,.fakeNotif,.fakeButton,.crack').forEach(e=>e.remove());
document.getElementById('game').classList.remove('shake','glitch');

if(freezeTouched && playerAlive) {
eliminatePlayer();
if(suddenDeathActive) { handleSuddenDeathResolution(false); return; }
} else if(suddenDeathActive && !freezeTouched && playerAlive) {
const bot = players.find(p => !p.isPlayer);
if(bot && !bot.alive) {
handleSuddenDeathResolution(true);
return;
}
}
resolveRound();
},7000);
});
}

function runSingleTrap(index){
if(!acceptingInput) return;
switch(index) {
case 0:
const notif1 = document.createElement('div');
notif1.className='fakeNotif';
notif1.innerHTML='<b>MESSAGE</b><br>Your friend challenged you. Tap to open.';
arena.appendChild(notif1);
break;
case 1:
const popup1 = document.createElement('div');
popup1.className='popup';
popup1.style.left=Math.random()*60+'vw';
popup1.style.top=Math.random()*50+'vh';
popup1.innerHTML=`<h2>System Alert</h2><p>Your storage is almost full.</p><button>Fix Now</button>`;
arena.appendChild(popup1);
break;
case 2:
const btn = document.createElement('div');
btn.className='fakeButton';
btn.innerHTML='FREE MONEY';
btn.style.left=Math.random()*60+'vw';
btn.style.top=Math.random()*60+'vh';
arena.appendChild(btn);
break;
case 3:
document.getElementById('game').classList.add('shake');
break;
case 4:
const popup2 = document.createElement('div');
popup2.className='popup';
popup2.style.left='50%';
popup2.style.top='50%';
popup2.style.transform='translate(-50%,-50%)';
popup2.innerHTML=`<h2>🎉 YOU WON</h2><p>Tap to claim your reward.</p><button>CLAIM</button>`;
arena.appendChild(popup2);
break;
case 5:
flash.style.transition='none';
flash.style.opacity='1';
setTimeout(()=>{
flash.style.transition='1s';
flash.style.opacity='0';
},100);
break;
case 6:
const crack = document.createElement('div');
crack.className='crack';
arena.appendChild(crack);
break;
case 7:
document.getElementById('game').classList.add('glitch');
break;
case 8:
const notif2 = document.createElement('div');
notif2.className='fakeNotif';
notif2.innerHTML='<b>⚠ Battery Critical</b><br>1% remaining. Plug charger now.';
arena.appendChild(notif2);
break;
case 9:
const notif3 = document.createElement('div');
notif3.className='fakeNotif';
notif3.innerHTML='<b>📞 Incoming Call</b><br>Mom is calling...';
arena.appendChild(notif3);
break;
}
}

function memory(){
currentMiniGame='memory';
expectedSequence=[];
playerSequence=[];
specificCauseOfDeath = "Failed to copy the structural memory pattern!";
roundTitle.innerHTML= suddenDeathActive ? 'SUDDEN DEATH 1V1' : 'ROUND ' + round;
instruction.innerHTML='MEMORIZE THE SEQUENCE';

const colors=['red','blue','green'];

countdown(3,()=>{
let i=0;
const show=setInterval(()=>{
const color=colors[Math.floor(Math.random()*colors.length)];
expectedSequence.push(color);
flashColor(color);
i++;

if(i>=3){
clearInterval(show);
setTimeout(()=>{
showMemoryButtons(colors);
},1200);
}
},800);
});
}

function showMemoryButtons(colors){
instruction.innerHTML = suddenDeathActive ? 'FASTEST COMPLETION WINS RESEQUENCE' : 'REPEAT THE SEQUENCE';
acceptingInput=true;
roundStartTime = performance.now();
startRoundTimer(5);

colors.forEach(color=>{
const btn=document.createElement('div');
btn.className='circleBtn';
btn.style.background=color;
btn.style.left=(25+Math.random()*50)+'vw';
btn.style.top=(35+Math.random()*40)+'vh';

btn.onclick=()=>{
if(!acceptingInput) return;
totalActions++;
playerSequence.push(color);
const currentIndex=playerSequence.length-1;

if(playerSequence[currentIndex]!==expectedSequence[currentIndex]){
eliminatePlayer();
if(suddenDeathActive) {
handleSuddenDeathResolution(false);
} else {
acceptingInput=false;
resolveRound();
}
return;
}

correctActions++;
if(playerSequence.length===expectedSequence.length){
trackReactionTime();
flashEffect();
if(suddenDeathActive) {
handleSuddenDeathResolution(true);
} else {
acceptingInput=false;
resolveRound();
}
}
};
arena.appendChild(btn);
});

simulateBots('memory');

if(!suddenDeathActive) {
setTimeout(()=>{
if(acceptingInput){
acceptingInput=false;
eliminatePlayer();
resolveRound();
}
},5000);
}
}

function flashColor(color){
flash.style.background=color;
flash.style.opacity='.8';
setTimeout(()=>{
flash.style.opacity='0';
},300);
}

function chaosRound(){
currentMiniGame='chaosRound';
specificCauseOfDeath = "Disobeyed the quick-logic modifier alert!";
roundTitle.innerHTML= suddenDeathActive ? 'SUDDEN DEATH 1V1' : 'ROUND ' + round;

const avoidBlue = Math.random() > 0.5;
if(suddenDeathActive) {
instruction.innerHTML = avoidBlue ? "FASTEST TO TAP RED/GREEN WINS (AVOID BLUE)" : "FASTEST TO TAP BLUE WINS";
} else {
instruction.innerHTML = avoidBlue ? "DON'T PRESS BLUE" : "PRESS BLUE TO SURVIVE";
}

const tiny=document.createElement('div');
tiny.style.marginTop='20px';
tiny.style.fontSize='16px';
tiny.style.opacity='.8';
tiny.innerHTML = avoidBlue ? '(pressing blue eliminates you)' : '(everyone else loses)';
instruction.appendChild(tiny);

countdown(3,()=>{
acceptingInput=true;
roundStartTime = performance.now();
startRoundTimer(4);

let playerActed = false;

['red','blue','green'].forEach((color,i)=>{
const btn=document.createElement('div');
btn.className='circleBtn';
btn.style.background=color;
btn.style.left=(25+i*25)+'vw';
btn.style.top='50vh';

btn.onclick=()=>{
if(!acceptingInput) return;
playerActed = true;
totalActions++;

const correct = avoidBlue ? (color !== 'blue') : (color === 'blue');

if(correct){
correctActions++;
trackReactionTime();
flashEffect();
if(suddenDeathActive) {
handleSuddenDeathResolution(true);
} else {
acceptingInput=false;
resolveRound();
}
}else{
specificCauseOfDeath = avoidBlue ? "You clicked blue when forbidden!" : "Failed to activate blue rule constraint!";
eliminatePlayer();
if(suddenDeathActive) {
handleSuddenDeathResolution(false);
} else {
acceptingInput=false;
resolveRound();
}
}
};
arena.appendChild(btn);
});

simulateBots('chaos', avoidBlue);

if(!suddenDeathActive) {
setTimeout(() => {
if(acceptingInput){
acceptingInput = false;
if(!avoidBlue && !playerActed) {
eliminatePlayer();
}
resolveRound();
}
}, 4000);
}
});
}

function followDot(){
currentMiniGame='followDot';
specificCauseOfDeath = "Missed tracking coordinates on the traveling entity!";
roundTitle.innerHTML= suddenDeathActive ? 'SUDDEN DEATH 1V1' : 'ROUND ' + round;
instruction.innerHTML = suddenDeathActive ? 'FIRST TO TAP MOVING DOT WINS' : 'TAP THE MOVING DOT';

countdown(3,()=>{
acceptingInput=true;
roundStartTime = performance.now();
startRoundTimer(6);

const dot=document.createElement('div');
dot.style.position='absolute';
dot.style.width='90px';
dot.style.height='90px';
dot.style.borderRadius='50%';
dot.style.background='linear-gradient(135deg,#60a5fa,#a855f7)';
dot.style.boxShadow='0 0 40px #60a5fa';
dot.style.left='50vw';
dot.style.top='50vh';
dot.style.cursor='pointer';

let x=50;
let y=50;

const move=setInterval(()=>{
x=10+Math.random()*80;
y=20+Math.random()*60;
dot.style.left=x+'vw';
dot.style.top=y+'vh';
},700);

dot.onclick=()=>{
if(!acceptingInput) return;
totalActions++;
correctActions++;
trackReactionTime();
clearInterval(move);
flashEffect();
if(suddenDeathActive) {
handleSuddenDeathResolution(true);
} else {
acceptingInput=false;
resolveRound();
}
};
arena.appendChild(dot);

simulateBots('followDot');

if(!suddenDeathActive) {
setTimeout(()=>{
if(acceptingInput){
clearInterval(move);
acceptingInput=false;
eliminatePlayer();
resolveRound();
}
},6000);
}
});
}

function simulateBots(type, extraParam){
const activeBot = players.find(p => !p.isPlayer && p.alive);
if(!activeBot) return;

if(suddenDeathActive) {
let reactionDelay = 600 + (Math.random() * 1200); 
if(type === 'memory') reactionDelay += 1000;      
if(type === 'freeze') reactionDelay = 4000;       

botActionTimeout = setTimeout(() => {
if(!acceptingInput) return;

if(type === 'freeze') {
if(Math.random() < activeBot.panic) {
activeBot.alive = false;
handleSuddenDeathResolution(true); 
}
} else if(type === 'chaos') {
const botFailsRule = Math.random() < (activeBot.panic * 0.5);
if(botFailsRule) {
activeBot.alive = false;
handleSuddenDeathResolution(true); 
} else {
handleSuddenDeathResolution(false); 
}
} else {
const botFailsRule = Math.random() < (activeBot.panic * 0.4);
if(botFailsRule) {
activeBot.alive = false;
handleSuddenDeathResolution(true);
} else {
handleSuddenDeathResolution(false); 
}
}
}, reactionDelay);

return; 
}

players.forEach(bot=>{
if(bot.isPlayer || !bot.alive) return;

let failChance = bot.panic;
if(type==='tapColor' && bot.reaction<0.35) failChance+=0.3;
if(type==='freeze' && bot.panic>0.2) failChance+=0.25; 
if(type==='memory' && bot.memory<0.4) failChance+=0.4;

if(Math.random()<failChance){
setTimeout(()=>{
bot.alive=false;
updatePlayerList();
},500+Math.random()*2000);
}
});
}

function resolveRound(){
const t=document.getElementById('liveTimer');
if(t) t.remove();
clearInterval(roundTimer);

setTimeout(()=>{
updatePlayerList();
clearArena();
tapCorrect=false;
nextRound();
},2000);
}

function eliminatePlayer() {
if(!playerAlive) return;

playerAlive=false;
players[0].alive=false;
updatePlayerList();

eliminatedBanner.style.display='block';
setTimeout(()=>{
eliminatedBanner.style.display='none';
},1500);
}

function populatePremiumStats(titleText, titleColor) {
  document.getElementById('title').innerHTML = titleText;
  document.getElementById('title').style.color = titleColor;
  document.getElementById('subtitle').innerHTML = 'ROUND ' + round;
  
  // Calculate Placement string based on current survivors array sizing
  const currentSurvivors = players.filter(p => p.alive).length + (playerAlive ? 0 : 1);
  document.getElementById('placement').innerHTML = `#${currentSurvivors} / 20 SURVIVORS`;
  
  // Cause of Death injection
  document.getElementById('cause').innerHTML = playerAlive ? "👑 Flawless Technical Match Execution" : `❌ ${specificCauseOfDeath}`;
  
  // Highlighting "Almost Won" contextual parameters
  if (currentSurvivors === 2 && !playerAlive) {
    document.getElementById('almost').innerHTML = "⚡ YOU WERE 1 ROUND FROM VICTORY";
    document.getElementById('almost').style.display = "block";
  } else if(playerAlive) {
    document.getElementById('almost').innerHTML = "🏆 SIMULATION MASTERED CONGRATULATIONS";
    document.getElementById('almost').style.display = "block";
  } else {
    document.getElementById('almost').style.display = "none";
  }
  
  // Push analytics parameters to UI cards
  document.getElementById('statRounds').innerHTML = round;
  document.getElementById('statFastest').innerHTML = fastestTap === Infinity ? "0.00s" : fastestTap.toFixed(2) + "s";
  
  const calcAccuracy = totalActions === 0 ? 100 : Math.round((correctActions / totalActions) * 100);
  document.getElementById('statAccuracy').innerHTML = calcAccuracy + "%";
  
  const eliminatedCount = 20 - players.filter(p => p.alive).length - (playerAlive ? 1 : 0);
  document.getElementById('statEliminated').innerHTML = eliminatedCount;
  
  // Trigger Background Particle Array Initialization dynamically
  const particlesContainer = document.getElementById("particles");
  particlesContainer.innerHTML = '';
  for(let i=0; i<40; i++){
    const p = document.createElement("div");
    p.className="particle";
    p.style.left = Math.random()*100+"vw";
    p.style.animationDuration = (6+Math.random()*10)+"s";
    p.style.animationDelay = Math.random()*5+"s";
    particlesContainer.appendChild(p);
  }

  // Trigger slow motion/vibration premium feedback rules
  document.body.animate([
    {filter:"blur(10px) brightness(2)"},
    {filter:"blur(0px) brightness(1)"}
  ],{
    duration:700,
    easing:"ease-out"
  });

  if(navigator.vibrate){
    navigator.vibrate([120,80,120]);
  }

  endScreen.style.display = 'flex';
}

function winGame(){
wins++;
localStorage.setItem('lm_wins',wins);
winsEl.innerHTML='Wins: '+wins;
updateRank();
populatePremiumStats('VICTORY', '#facc15');
}

function loseGame(){
updateRank();
const popup=document.createElement('div');
popup.style.position='absolute';
popup.style.inset='0';
popup.style.background='rgba(0,0,0,.92)';
popup.style.display='flex';
popup.style.alignItems='center';
popup.style.justifyContent='center';
popup.style.flexDirection='column';
popup.style.zIndex='200';
popup.innerHTML=`<div style="font-size:100px;font-weight:900;color:#ef4444">ELIMINATED</div><div style="font-size:34px;margin-top:10px">Please wait <span id='waitTimer'>4</span>s</div>`;
document.getElementById('game').appendChild(popup);
let wait=4;
const waitInterval=setInterval(()=>{
wait--;
const wt=document.getElementById('waitTimer');
if(wt) wt.innerHTML=wait;
if(wait<=0){
clearInterval(waitInterval);
popup.remove();
populatePremiumStats('HEARTBREAK', '#ef4444');
}
},1000);
}

function updateRank(){
let rank='Bronze';
if(wins>=3) rank='Silver';
if(wins>=7) rank='Gold';
if(wins>=15) rank='Diamond';
if(wins>=30) rank='Elite';
if(wins>=60) rank='Last One';

rankEl.innerHTML='Rank: '+rank;
}

function clearArena(){
arena.innerHTML='';
}

function flashEffect(){
flash.style.background='white';
flash.style.opacity='.9';
setTimeout(()=>{
flash.style.opacity='0';
},150);
}

function goHome(){
endScreen.style.display='none';
gameUI.classList.add('hidden');
menu.classList.remove('hidden');
clearArena();
}

function restartGame(){
endScreen.style.display='none';
setupPlayers();
nextRound();
}

window.addEventListener('touchstart',(e)=>{
const t=e.touches[0];
touchFeedback(t.clientX,t.clientY);
if(currentMiniGame==='freeze' && acceptingInput){
freezeTouched=true;
}
},{passive:false});

window.addEventListener('mousedown',(e)=>{
if(e.target.classList.contains('endBtn') || e.target.classList.contains('btn')) return;
touchFeedback(e.clientX,e.clientY);
if(currentMiniGame==='freeze' && acceptingInput){
freezeTouched=true;
}
});

updateRank();
</script>
